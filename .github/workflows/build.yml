name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Compile sketch
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino data
        uses: actions/cache@v5
        with:
          path: ~/.arduino15
          key: arduino-${{ runner.os }}-esp32-3.3.7-fastled-3.10.3-arduinojson-7

      - name: Install ESP32 platform
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.7

      - name: Install libraries
        run: |
          arduino-cli lib install "FastLED@3.10.3"
          arduino-cli lib install "ArduinoJson@7.3.1"

      - name: Compile sketch
        run: arduino-cli compile --fqbn "esp32:esp32:d1_mini32:PartitionScheme=min_spiffs" --export-binaries .

      - name: Report binary size
        run: |
          BIN=build/esp32.esp32.d1_mini32/esp32-weather-leds.ino.bin
          SIZE=$(wc -c < "$BIN")
          LIMIT=1966080   # min_spiffs OTA slot = 0x1E0000 bytes
          PCT=$(( SIZE * 100 / LIMIT ))
          echo "Binary size : $(numfmt --grouping $SIZE) bytes  (${PCT}% of ${LIMIT} byte OTA slot)"
          if [ $SIZE -gt $LIMIT ]; then
            echo "ERROR: binary exceeds OTA slot — reduce sketch size or switch partition scheme"
            exit 1
          fi

      - name: Rename binary with version
        run: |
          MAJOR=$(grep '#define FW_VERSION_MAJOR' version.h | awk '{print $3}')
          MINOR=$(grep '#define FW_VERSION_MINOR' version.h | awk '{print $3}')
          PATCH=$(grep '#define FW_VERSION_PATCH' version.h | awk '{print $3}')
          TIMESTAMP=$(date -u +%Y%m%d-%H%M%S)
          VERSION="${MAJOR}.${MINOR}.${PATCH}-dev-${TIMESTAMP}"
          echo "FW_VERSION=${VERSION}" >> $GITHUB_ENV
          cp build/esp32.esp32.d1_mini32/esp32-weather-leds.ino.bin \
             esp32-weather-leds-v${VERSION}.bin

      - name: Upload binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: esp32-weather-leds-v${{ env.FW_VERSION }}
          path: esp32-weather-leds-v${{ env.FW_VERSION }}.bin

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino data
        uses: actions/cache@v5
        with:
          path: ~/.arduino15
          key: arduino-${{ runner.os }}-esp32-3.3.7-fastled-3.10.3-arduinojson-7

      - name: Install ESP32 platform
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.7

      - name: Install libraries
        run: |
          arduino-cli lib install "FastLED@3.10.3"
          arduino-cli lib install "ArduinoJson@7.3.1"

      - name: Compile release build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          arduino-cli compile --fqbn "esp32:esp32:d1_mini32:PartitionScheme=min_spiffs" \
            --export-binaries \
            --build-property "compiler.cpp.extra_flags=-DFW_VERSION_SUFFIX=\"\"" \
            .
          BIN=build/esp32.esp32.d1_mini32/esp32-weather-leds.ino.bin
          SIZE=$(wc -c < "$BIN")
          LIMIT=1966080
          PCT=$(( SIZE * 100 / LIMIT ))
          echo "Binary size : $(numfmt --grouping $SIZE) bytes  (${PCT}% of ${LIMIT} byte OTA slot)"
          cp "$BIN" esp32-weather-leds-v${VERSION}.bin

      - name: Create GitHub Release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "${GITHUB_REF_NAME}" \
            --title "v${VERSION}" \
            --generate-notes \
            "esp32-weather-leds-v${VERSION}.bin"
        env:
          GH_TOKEN: ${{ github.token }}
