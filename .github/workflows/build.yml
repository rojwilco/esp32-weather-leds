name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    name: Compile sketch
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino data
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-${{ runner.os }}-esp32-3.3.7-fastled-3.10.3-arduinojson-7

      - name: Install ESP32 platform
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.7

      - name: Install libraries
        run: |
          arduino-cli lib install "FastLED@3.10.3"
          arduino-cli lib install "ArduinoJson@7.3.1"

      - name: Compile sketch
        run: arduino-cli compile --fqbn esp32:esp32:d1_mini32 esp32-weather-leds

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-dev
          path: esp32-weather-leds/build/esp32.esp32.d1_mini32/esp32-weather-leds.ino.bin

  release:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino data
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-${{ runner.os }}-esp32-3.3.7-fastled-3.10.3-arduinojson-7

      - name: Install ESP32 platform
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@3.3.7

      - name: Install libraries
        run: |
          arduino-cli lib install "FastLED@3.10.3"
          arduino-cli lib install "ArduinoJson@7.3.1"

      - name: Compile release build
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          arduino-cli compile --fqbn esp32:esp32:d1_mini32 \
            --build-property "compiler.cpp.extra_flags=-DFW_VERSION_SUFFIX=\"\"" \
            esp32-weather-leds
          cp esp32-weather-leds/build/esp32.esp32.d1_mini32/esp32-weather-leds.ino.bin \
             esp32-weather-leds-v${VERSION}.bin

      - name: Create GitHub Release
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "${GITHUB_REF_NAME}" \
            --title "v${VERSION}" \
            --generate-notes \
            "esp32-weather-leds-v${VERSION}.bin"
        env:
          GH_TOKEN: ${{ github.token }}
